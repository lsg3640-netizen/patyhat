<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고깔모자 원단 목업 메이커</title>
  <style>
:root {
  --app-gap: 24px;
  --app-pad: 24px;
}

:root {
  --bg: #f6f0e7;
  --panel: #fffaf4;
  --panel-strong: #ffffff;
  --ink: #1f2b37;
  --muted: #566575;
  --line: #d7cbbb;
  --accent: #cc5a2a;
  --accent-soft: #ffe0cf;
  --shadow: 0 16px 40px rgba(48, 39, 27, 0.12);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 14px;
}

* {
  box-sizing: border-box;
}

body {
  height: 100%;
  margin: 0;
  font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(255, 232, 204, 0.95), transparent 32%),
    linear-gradient(180deg, #fdf7ef 0%, var(--bg) 100%);
}

html {
  height: 100%;
  overflow: hidden;
}

body {
  height: 100%;
  overflow: hidden;
}

#root {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

button,
input,
select {
  font: inherit;
}

.app-shell,
.app {
  height: 100vh;
  padding: var(--app-pad);
  display: flex;
  gap: var(--app-gap);
  overflow: hidden;
}

.left-column,
.left-panel {
  width: 340px;
  min-width: 340px;
  height: calc(100vh - (var(--app-pad) * 2));
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}

.hero {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  flex: 0 0 auto;
  padding: 8px 10px;
  background: linear-gradient(135deg, rgba(255, 250, 244, 0.96), rgba(255, 239, 223, 0.95));
  border: 1px solid rgba(215, 203, 187, 0.85);
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(48, 39, 27, 0.08);
}

.left-header {
  flex-shrink: 0;
  min-height: 0;
}

.left-content,
.left-scroll {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 6px;
}

.eyebrow {
  margin: 0 0 2px;
  font-size: 0.66rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: #b75f2c;
  text-transform: uppercase;
}

.hero h1,
.preview-head h2 {
  margin: 0;
  line-height: 1.08;
}

.hero h1 {
  font-size: clamp(1rem, 1.2vw, 1.1rem);
  white-space: nowrap;
}

.preview-head h2 {
  font-size: clamp(2rem, 3vw, 3.2rem);
}

.hero-copy {
  max-width: 100%;
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 0.72rem;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0.9;
}

.hero-badges {
  display: flex;
  flex-wrap: wrap;
  align-content: center;
  justify-content: flex-end;
  gap: 6px;
  min-width: 180px;
  max-width: 210px;
}

.hero-badges span {
  padding: 5px 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.8);
  border: 1px solid rgba(208, 183, 155, 0.8);
  font-weight: 700;
  font-size: 0.72rem;
  line-height: 1;
  white-space: nowrap;
}

.control-panel {
  display: grid;
  gap: 14px;
  align-content: start;
}

.panel-section,
.preview-panel {
  background: rgba(255, 250, 244, 0.95);
  border: 1px solid rgba(215, 203, 187, 0.9);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
}

.panel-section {
  padding: 22px 20px;
}

.panel-section h2 {
  margin: 0 0 18px;
  font-size: 1.15rem;
}

.field {
  display: grid;
  gap: 10px;
  margin-bottom: 16px;
}

.field span {
  font-weight: 700;
}

.field-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
}

.field-row strong {
  min-width: 64px;
  padding: 10px 12px;
  border-radius: 12px;
  background: #fff;
  text-align: center;
  color: #405266;
}

.field-row.compact {
  grid-template-columns: 72px minmax(0, 1fr);
}

input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}

input[type="color"] {
  width: 100%;
  min-height: 48px;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  cursor: pointer;
}

.wide-input,
.wide-select {
  width: 100%;
  min-height: 50px;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
}

.text-area-input {
  min-height: 92px;
  resize: vertical;
  line-height: 1.45;
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 48px;
  margin-bottom: 16px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.8);
  font-weight: 700;
}

.toggle-row input {
  width: 22px;
  height: 22px;
  accent-color: var(--accent);
}

.file-card {
  display: grid;
  gap: 6px;
  padding: 18px;
  border-radius: 18px;
  border: 2px dashed #d2b99f;
  background: linear-gradient(180deg, #fffefb, #fff5ea);
  cursor: pointer;
}

.file-card input {
  margin-top: 8px;
}

.file-card-title {
  font-size: 1.05rem;
  font-weight: 800;
}

.file-card-sub {
  color: var(--muted);
}

.file-card.mini {
  margin-bottom: 16px;
}

.file-actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

.primary-btn,
.secondary-btn {
  min-height: 54px;
  padding: 0 18px;
  border-radius: 16px;
  border: 0;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
}

.primary-btn:hover,
.secondary-btn:hover {
  transform: translateY(-1px);
}

.primary-btn {
  width: 100%;
  color: #fff;
  background: linear-gradient(135deg, #d96330, #b84c23);
  box-shadow: 0 12px 24px rgba(184, 76, 35, 0.25);
}

.secondary-btn {
  color: var(--ink);
  background: #fff;
  border: 1px solid var(--line);
}

.secondary-btn.full {
  width: 100%;
}

.status-text {
  margin: 12px 0 0;
  color: var(--muted);
  line-height: 1.55;
}

.status-text.small {
  font-size: 0.92rem;
}

.divider {
  height: 1px;
  margin: 18px 0;
  background: linear-gradient(90deg, transparent, rgba(193, 173, 148, 0.85), transparent);
}

.preview-panel,
.right-preview {
  position: relative;
  flex: 1 1 auto;
  height: calc(100vh - (var(--app-pad) * 2));
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding: 20px;
  overflow: hidden;
}

.preview-head {
  flex: 0 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 16px;
}

.preview-note {
  max-width: 320px;
  color: var(--muted);
  line-height: 1.5;
  text-align: right;
}

.preview-canvas-wrap {
  position: relative;
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
}

.preview-stage {
  position: relative;
  flex: 1 1 auto;
  overflow: hidden;
  border-radius: 26px;
  border: 1px solid rgba(215, 203, 187, 0.9);
  background: #ffffff;
  cursor: default;
}

.preview-stage::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(0, 0, 0, 0.05));
}

#previewCanvas {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  aspect-ratio: 1 / 1;
}

@media (max-width: 1180px) {
  :root {
    --app-gap: 16px;
    --app-pad: 16px;
  }

  .app-shell,
  .app {
    flex-direction: column;
  }

  .preview-head {
    flex-direction: column;
    align-items: flex-start;
  }

  .preview-note {
    max-width: none;
    text-align: left;
  }

  .left-column {
    order: 2;
  }

  .left-column,
  .left-panel,
  .preview-panel,
  .right-preview {
    width: 100%;
    min-width: 0;
  }

  .left-column,
  .left-panel {
    flex: 1 1 auto;
    height: auto;
  }

  .preview-panel,
  .right-preview {
    order: 1;
    flex: 0 0 42vh;
    height: 42vh;
  }
}

@media (max-width: 760px) {
  :root {
    --app-gap: 12px;
    --app-pad: 12px;
  }

  .hero {
    padding: 7px 8px;
  }

  .hero-badges {
    justify-content: flex-start;
    max-width: none;
  }

  .panel-section,
  .preview-panel {
    padding: 16px 14px;
  }

  .preview-panel,
  .right-preview {
    flex-basis: 38vh;
    height: 38vh;
  }

  .preview-head {
    margin-bottom: 12px;
  }

  .preview-stage {
    border-radius: 20px;
  }

  .hero h1 {
    white-space: normal;
  }

  .hero-copy {
    display: none;
  }
}
  </style>
</head>
<body>
  <div class="app-shell app">
    <section class="left-column left-panel">
      <header class="hero left-header">
        <div>
          <p class="eyebrow">오프라인 / 설치 없음</p>
          <h1>고깔모자 원단 목업 메이커</h1>
          <p id="modelStatus" class="hero-copy">실제 model.jpg 기준 미리보기</p>
        </div>
        <div class="hero-badges">
          <span>JPG / PNG</span>
          <span>기준 사진 고정</span>
          <span>합성 PNG 저장</span>
        </div>
      </header>

      <div class="left-content left-scroll">
        <aside class="control-panel">
          <section class="panel-section">
            <h2>1. 원단 업로드</h2>
            <label class="file-card">
              <span class="file-card-title">고깔/리본 원단 이미지 선택</span>
              <span class="file-card-sub">파일 선택 또는 캡쳐 후 Ctrl+V로 붙여넣기</span>
              <input id="fabricUpload" type="file" accept="image/png, image/jpeg">
            </label>
            <div class="file-actions">
              <button id="resetFabricBtn" type="button" class="secondary-btn">원단 위치 초기화</button>
            </div>
            <p id="fabricStatus" class="status-text">업로드한 원단이 고깔과 턱 리본에 함께 적용됩니다.</p>
          </section>

          <section class="panel-section">
            <h2>2. 원단 조절</h2>
            <label class="field">
              <span>확대 / 축소</span>
              <div class="field-row">
                <input id="fabricScale" type="range" min="30" max="240" step="1" value="100">
                <strong id="fabricScaleValue">100%</strong>
              </div>
            </label>
            <label class="field">
              <span>좌우 이동</span>
              <div class="field-row">
                <input id="fabricOffsetX" type="range" min="-400" max="400" step="1" value="0">
                <strong id="fabricOffsetXValue">0</strong>
              </div>
            </label>
            <label class="field">
              <span>상하 이동</span>
              <div class="field-row">
                <input id="fabricOffsetY" type="range" min="-400" max="400" step="1" value="0">
                <strong id="fabricOffsetYValue">0</strong>
              </div>
            </label>
            <label class="field">
              <span>회전</span>
              <div class="field-row">
                <input id="fabricRotation" type="range" min="-180" max="180" step="1" value="0">
                <strong id="fabricRotationValue">0°</strong>
              </div>
            </label>
            <label class="toggle-row">
              <input id="patternRepeat" type="checkbox" checked>
              <span>반복 패턴 사용</span>
            </label>
          </section>

          <section class="panel-section">
            <h2>3. 폼폼</h2>
            <label class="toggle-row">
              <input id="showPompom" type="checkbox" checked>
              <span>폼폼 표시</span>
            </label>
            <label class="field">
              <span>폼폼 색상</span>
              <div class="field-row compact">
                <input id="pompomColor" type="color" value="#c71c2f">
                <strong id="pompomColorValue">#c71c2f</strong>
              </div>
            </label>
            <label class="field">
              <span>폼폼 크기</span>
              <div class="field-row">
                <input id="pompomSize" type="range" min="26" max="96" step="1" value="56">
                <strong id="pompomSizeValue">56</strong>
              </div>
            </label>
          </section>

          <section class="panel-section">
            <h2>4. 문구 / 로고</h2>
            <label class="field">
              <span>문구 입력</span>
              <textarea id="logoText" class="wide-input text-area-input" placeholder="예: love you&#10;Dad"></textarea>
            </label>
            <label class="field">
              <span>문구 폰트</span>
              <select id="textFont" class="wide-select">
                <option value="basic">기본체</option>
                <option value="bold">굵은체</option>
                <option value="script">필기체</option>
              </select>
            </label>
            <label class="field">
              <span>문구 색상</span>
              <div class="field-row compact">
                <input id="textColor" type="color" value="#d43e36">
                <strong id="textColorValue">#d43e36</strong>
              </div>
            </label>
            <label class="field">
              <span>문구 크기</span>
              <div class="field-row">
                <input id="textSize" type="range" min="18" max="110" step="1" value="56">
                <strong id="textSizeValue">56</strong>
              </div>
            </label>
            <label class="field">
              <span>문구 좌우 위치</span>
              <div class="field-row">
                <input id="textOffsetX" type="range" min="-220" max="220" step="1" value="0">
                <strong id="textOffsetXValue">0</strong>
              </div>
            </label>
            <label class="field">
              <span>문구 상하 위치</span>
              <div class="field-row">
                <input id="textOffsetY" type="range" min="-220" max="220" step="1" value="0">
                <strong id="textOffsetYValue">0</strong>
              </div>
            </label>

            <div class="divider"></div>

            <label class="file-card mini">
              <span class="file-card-title">앞면 로고 이미지 선택</span>
              <span class="file-card-sub">선택 사항 / PNG, JPG</span>
              <input id="logoUpload" type="file" accept="image/png, image/jpeg">
            </label>
            <label class="field">
              <span>로고 크기</span>
              <div class="field-row">
                <input id="logoScale" type="range" min="20" max="220" step="1" value="90">
                <strong id="logoScaleValue">90%</strong>
              </div>
            </label>
            <label class="field">
              <span>로고 좌우 위치</span>
              <div class="field-row">
                <input id="logoOffsetX" type="range" min="-220" max="220" step="1" value="0">
                <strong id="logoOffsetXValue">0</strong>
              </div>
            </label>
            <label class="field">
              <span>로고 상하 위치</span>
              <div class="field-row">
                <input id="logoOffsetY" type="range" min="-220" max="220" step="1" value="0">
                <strong id="logoOffsetYValue">0</strong>
              </div>
            </label>
            <button id="clearLogoBtn" type="button" class="secondary-btn full">로고 제거</button>
          </section>

          <section class="panel-section">
            <h2>5. 저장</h2>
            <button id="downloadBtn" type="button" class="primary-btn">합성 PNG 저장</button>
            <button id="downloadTransparentBtn" type="button" class="secondary-btn full">고깔/리본 영역만 투명 PNG 저장</button>
            <p class="status-text small">실제 model.jpg 사진은 고정으로 유지되고, 기존 파티햇과 턱 리본 원단 영역만 바뀐 결과가 저장됩니다.</p>
          </section>
        </aside>
      </div>
    </section>

    <section class="preview-panel right-preview">
      <div class="preview-head">
        <div>
          <p class="eyebrow">실시간 미리보기</p>
          <h2>완성 이미지</h2>
        </div>
        <div class="preview-note">실제 사진은 그대로 두고, 기존 파티햇과 턱 리본의 원단 영역만 같은 원단으로 함께 변경합니다.</div>
      </div>
      <div class="preview-canvas-wrap">
        <div id="previewStage" class="preview-stage">
          <canvas id="previewCanvas" width="1400" height="1400" aria-label="고깔모자 미리보기"></canvas>
        </div>
      </div>
    </section>
  </div>

  <script charset="utf-8" src="./app.js"></script>
</body>
</html>
